application:
  name: mattermost-playbooks
  pods:
  - name: app
    image: mirror.gcr.io/mattermost/mattermost-team-edition:latest
    path: /
    servicePorts:
    - 8065
    vars:
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: "postgres://mattermost:mattermost@postgres.pod:5432/mattermost?sslmode=disable&connect_timeout=10"
      MM_SERVICESETTINGS_SITEURL: "https://relaxed-weasel-mattermost-playbooks.cloud.nexlayer.ai"
  - name: postgres
    image: mirror.gcr.io/library/postgres:16-alpine
    servicePorts:
    - 5432
    vars:
      POSTGRES_DB: mattermost
      POSTGRES_USER: mattermost
      POSTGRES_PASSWORD: mattermost
    volumes:
    - name: mattermost-db
      mountPath: /var/lib/postgresql/data
      size: 10Gi
